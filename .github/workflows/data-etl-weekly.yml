name: Data ETL (Weekly)

on:
  schedule:
    # Sunday 05:00 UTC ≈ 08:00 Istanbul
    - cron: '0 5 * * 0'
  workflow_dispatch:

concurrency:
  group: data-etl-weekly
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  etl:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      USE_SYSTEM_PYTHON: '1'
      DB_STATEMENT_TIMEOUT: 60min
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: data_pipeline/requirements.txt

      - name: Install pipeline dependencies
        working-directory: data_pipeline
        run: pip install -r requirements.txt

      - name: Validate DATABASE_URL for CI
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: chmod +x scripts/validate_ci_database_url.sh && ./scripts/validate_ci_database_url.sh

      - name: Write pipeline .env
        working-directory: data_pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          test -n "$DATABASE_URL" || (echo "Missing DATABASE_URL secret" && exit 1)
          printf 'DATABASE_URL=%s\nAPI_FOOTBALL_KEY=%s\n' "$DATABASE_URL" "$API_FOOTBALL_KEY" > .env

      - name: Run weekly ETL
        timeout-minutes: 75
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_KEY: ${{ secrets.KAGGLE_KEY }}
        run: chmod +x scripts/run_scheduled_etl.sh && ./scripts/run_scheduled_etl.sh

      - name: Summary
        if: always()
        run: echo "Weekly ETL finished at $(date -u)"
