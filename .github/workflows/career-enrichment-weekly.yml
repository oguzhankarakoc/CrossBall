name: Career Enrichment (Weekly)

on:
  schedule:
    # Saturday 04:00 UTC — refresh transfer stints before Sunday ETL
    - cron: '0 4 * * 6'
  workflow_dispatch:

concurrency:
  group: career-enrichment-weekly
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      CAREER_ENRICH_LOAD: '1'
      PATCH_LOAD_LIGHT: '0'
      DB_STATEMENT_TIMEOUT: 45min
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: data_pipeline/requirements.txt

      - name: Install pipeline dependencies
        working-directory: data_pipeline
        run: pip install -r requirements.txt

      - name: Validate DATABASE_URL for CI
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: chmod +x scripts/validate_ci_database_url.sh && ./scripts/validate_ci_database_url.sh

      - name: Write pipeline .env
        working-directory: data_pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          test -n "$DATABASE_URL" || (echo "Missing DATABASE_URL secret" && exit 1)
          test -n "$API_FOOTBALL_KEY" || (echo "Missing API_FOOTBALL_KEY secret" && exit 1)
          printf 'DATABASE_URL=%s\nAPI_FOOTBALL_KEY=%s\n' "$DATABASE_URL" "$API_FOOTBALL_KEY" > .env

      - name: Run career enrichment
        run: chmod +x scripts/run_career_enrichment.sh && ./scripts/run_career_enrichment.sh

      - name: Upload gap report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: career-gaps
          path: reports/career_gaps.csv
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: echo "Career enrichment finished at $(date -u)"
