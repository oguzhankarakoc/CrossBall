name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  flutter:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v5
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.38.9'
          cache: true
      - name: Create stub .env for analyze (real secrets stay local / GitHub Secrets)
        run: cp .env.example .env
      - name: Prepare Flutter build directory
        run: |
          if [ -L build ] || [ -e build ]; then rm -rf build; fi
          mkdir -p build
      - run: flutter pub get
      - run: flutter gen-l10n
      - run: flutter analyze --no-fatal-infos
      - run: flutter test

  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: data_pipeline
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: data_pipeline/requirements.txt
      - run: pip install -r requirements.txt
      - run: pytest tests/ -q
