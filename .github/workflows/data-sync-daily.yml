name: Data Sync (Daily)

on:
  schedule:
    # Early attempt before UTC midnight (GitHub schedule can lag hours behind cron).
    - cron: '30 23 * * *'
    # Fallback window at UTC midnight.
    - cron: '0 0 * * *'
  workflow_dispatch:

concurrency:
  group: data-sync-daily
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    # Light load + fast daily path should finish well under this; keep headroom for API lag.
    timeout-minutes: 90
    env:
      PATCH_LOAD_LIGHT: '1'
      ENSURE_DAILY_TIER: hard
      DB_STATEMENT_TIMEOUT: 30min
      USE_SYSTEM_PYTHON: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: data_pipeline/requirements.txt

      - name: Install pipeline dependencies
        working-directory: data_pipeline
        run: pip install -r requirements.txt

      - name: Validate DATABASE_URL for CI
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: chmod +x scripts/validate_ci_database_url.sh && ./scripts/validate_ci_database_url.sh

      - name: Write pipeline .env
        working-directory: data_pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: |
          test -n "$DATABASE_URL" || (echo "Missing DATABASE_URL secret" && exit 1)
          test -n "$API_FOOTBALL_KEY" || (echo "Missing API_FOOTBALL_KEY secret" && exit 1)
          printf 'DATABASE_URL=%s\nAPI_FOOTBALL_KEY=%s\n' "$DATABASE_URL" "$API_FOOTBALL_KEY" > .env

      - name: Gate — skip if today's sync already completed
        id: gate
        run: |
          chmod +x scripts/run_scheduled_sync.sh
          RESULT="$(./scripts/run_scheduled_sync.sh gate)"
          echo "$RESULT"
          if [ "$RESULT" = "SKIP" ]; then
            echo "proceed=false" >> "$GITHUB_OUTPUT"
          else
            echo "proceed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Apply pending database migrations
        if: steps.gate.outputs.proceed == 'true'
        timeout-minutes: 15
        run: chmod +x scripts/run_migrations.sh && ./scripts/run_migrations.sh

      - name: Begin daily puzzle rollout
        if: steps.gate.outputs.proceed == 'true'
        timeout-minutes: 5
        run: ./scripts/run_scheduled_sync.sh rollout-begin

      - name: UTC date for API cache key
        if: steps.gate.outputs.proceed == 'true'
        id: cache-date
        run: echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      - name: Restore API-Football response cache
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/cache/restore@v4
        with:
          path: data_pipeline/data/cache/api_football
          # One key per UTC day so same-day retries reuse; restore-keys fall back to prior days.
          key: api-football-cache-${{ steps.cache-date.outputs.date }}
          restore-keys: |
            api-football-cache-

      - name: Check API-Football quota
        if: steps.gate.outputs.proceed == 'true'
        working-directory: data_pipeline
        run: python -m pipeline api-football-status

      - name: Fetch API-Football transfers
        if: steps.gate.outputs.proceed == 'true'
        timeout-minutes: 35
        env:
          API_FOOTBALL_MIN_REMAINING: '30'
        run: ./scripts/run_scheduled_sync.sh sync-fetch

      - name: Save API-Football response cache
        if: always() && steps.gate.outputs.proceed == 'true'
        continue-on-error: true
        uses: actions/cache/save@v4
        with:
          path: data_pipeline/data/cache/api_football
          key: api-football-cache-${{ steps.cache-date.outputs.date }}

      - name: Apply career patches (light load)
        if: steps.gate.outputs.proceed == 'true'
        timeout-minutes: 35
        run: ./scripts/run_scheduled_sync.sh sync-load

      - name: Ensure today's daily puzzle
        if: steps.gate.outputs.proceed == 'true'
        # Fast path first in ensure_daily_puzzle; quality fallback only if needed.
        timeout-minutes: 25
        run: ./scripts/run_scheduled_sync.sh ensure-daily

      - name: Recover rollout on failure
        if: failure() && steps.gate.outputs.proceed == 'true'
        env:
          ROLLOUT_FAIL_MESSAGE: Daily sync step failed or timed out in GitHub Actions
        run: |
          cd data_pipeline
          python -m pipeline daily-rollout-fail

      - name: Summary
        if: always()
        run: |
          echo "Daily sync finished at $(date -u)"
          echo "gate_proceed=${{ steps.gate.outputs.proceed }}"
          echo "PATCH_LOAD_LIGHT=$PATCH_LOAD_LIGHT ENSURE_DAILY_TIER=$ENSURE_DAILY_TIER"
