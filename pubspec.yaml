name: crossball
description: "CrossBall — Connect clubs. Prove your football IQ. Football intersection puzzle app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  go_router: ^14.8.1
  supabase_flutter: ^2.9.0
  flutter_dotenv: ^5.2.1
  intl: any
  uuid: ^4.5.1
  shared_preferences: ^2.5.3
  flutter_secure_storage: ^9.2.4
  google_mobile_ads: ^6.0.0
  connectivity_plus: ^6.1.4
  equatable: ^2.0.7
  collection: ^1.19.1
  path_provider: ^2.1.5
  http: ^1.4.0
  share_plus: ^11.0.0
  in_app_purchase: ^3.2.3
  app_links: ^6.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#051F14"
  adaptive_icon_foreground: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  generate: true
  assets:
    - .env
    - assets/icon/app_icon.png
